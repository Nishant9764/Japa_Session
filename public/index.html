<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Japa Session Tool</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a0a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  /* ── Reset & Base ──────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #000;
    color: #fff;
    cursor: default;
    user-select: none;
  }

  /* ── Slideshow ─────────────────────────────────────── */
  #slideshow {
    position: fixed; inset: 0;
    z-index: 0;
  }
  .slide {
    position: absolute; inset: 0;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: transparent;
    opacity: 0;
    transition: opacity 1.8s ease-in-out;
  }
  .slide.active { opacity: 1; }

  /* Dim overlay for readability */
  #slideshow::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.2);
    pointer-events: none;
  }

  /* Mantra background for empty areas around contained images */
  #mantra-bg {
    position: fixed; inset: 0;
    z-index: -1;
    background: linear-gradient(135deg, #1a0a2e 0%, #0d1b3e 50%, #1a0a2e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #mantra-bg .mantra-watermark {
    position: absolute;
    inset: 0;
    display: flex;
    flex-wrap: wrap;
    align-content: center;
    justify-content: center;
    gap: 18px 40px;
    padding: 20px;
    opacity: 0.10;
    pointer-events: none;
  }
  #mantra-bg .mantra-watermark span {
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    font-weight: bold;
    color: #ffd700;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  /* ── Mantra Overlay ────────────────────────────────── */
  #mantra {
    position: fixed;
    top: 16%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    line-height: 1.55;
    font-size: clamp(1.4rem, 3.5vw, 2.8rem);
    font-weight: bold;
    color: #fff;
    text-shadow:
      0 0 20px rgba(0,0,0,0.9),
      0 0 40px rgba(0,0,0,0.7),
      2px 2px 4px rgba(0,0,0,0.95);
    letter-spacing: 0.04em;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ── Timer Display ─────────────────────────────────── */
  #timer-display {
    position: fixed;
    top: 4%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: clamp(3rem, 8vw, 7rem);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    color: #fff;
    text-shadow:
      0 0 30px rgba(255, 200, 50, 0.5),
      0 0 60px rgba(255, 150, 0, 0.3),
      2px 2px 6px rgba(0,0,0,0.9);
    pointer-events: none;
    transition: color 0.3s;
  }
  #timer-display.warning { color: #ff6b6b; }
  #timer-display.done {
    color: #ff4444;
    animation: pulse 0.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Controls Bar ──────────────────────────────────── */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    transition: opacity 0.4s, transform 0.4s;
  }
  #controls.hidden {
    opacity: 0;
    transform: translateY(100%);
    pointer-events: none;
  }

  .btn {
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: clamp(0.8rem, 1.5vw, 1rem);
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.6);
  }
  .btn:active {
    transform: scale(0.95);
  }
  .btn.primary {
    background: rgba(76, 175, 80, 0.4);
    border-color: rgba(76, 175, 80, 0.6);
  }
  .btn.primary:hover {
    background: rgba(76, 175, 80, 0.6);
  }
  .btn.warning {
    background: rgba(255, 152, 0, 0.4);
    border-color: rgba(255, 152, 0, 0.6);
  }
  .btn.warning:hover {
    background: rgba(255, 152, 0, 0.6);
  }
  .btn.accent {
    background: rgba(33, 150, 243, 0.4);
    border-color: rgba(33, 150, 243, 0.6);
  }
  .btn.accent:hover {
    background: rgba(33, 150, 243, 0.6);
  }

  /* Toggle button for showing/hiding controls */
  #toggle-controls {
    position: fixed;
    bottom: 10px; right: 10px;
    z-index: 200;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(5px);
    transition: all 0.2s;
  }
  #toggle-controls:hover {
    background: rgba(255,255,255,0.15);
  }

  /* ── No-images fallback ────────────────────────────── */
  #no-images {
    position: fixed; inset: 0;
    z-index: 5;
    display: none;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a0a2e 0%, #0d1b3e 50%, #1a0a2e 100%);
    flex-direction: column;
    gap: 20px;
  }
  #no-images.show { display: flex; }
  #no-images p {
    font-size: 1.2rem;
    color: rgba(255,255,255,0.6);
    text-align: center;
    max-width: 500px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="mantra-bg">
  <div class="mantra-watermark" id="watermark"></div>
</div>
<div id="slideshow"></div>

<div id="no-images">
  <p>No images found in <strong>NRJD_Pics</strong> folder.<br>
  Add .jpg / .jpeg / .png images and reload.</p>
</div>

<div id="timer-display">3:00</div>

<div id="mantra">
  HARE KRISHNA HARE KRISHNA<br>
  KRISHNA KRISHNA HARE HARE<br>
  HARE RAMA HARE RAMA<br>
  RAMA RAMA HARE HARE
</div>

<div id="controls">
  <button class="btn primary" id="btn-start">▶ Start</button>
  <button class="btn" id="btn-pause" disabled>⏸ Pause</button>
  <button class="btn warning" id="btn-reset">↺ Reset (3:00)</button>
  <button class="btn accent" id="btn-next">⏭ Next (🔔 + Reset)</button>
  <button class="btn" id="btn-fullscreen">⛶ Fullscreen</button>
</div>

<button id="toggle-controls" title="Toggle Controls">☰</button>

<script>
// ══════════════════════════════════════════════════════
//  TEMPLE BELL – from Temple_Bell_Sound.mp3 (1.5s clip × 3)
// ══════════════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let bellBuffer = null; // decoded full audio buffer
let bellClip = null;   // trimmed 1.5s buffer

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Preload and decode the bell MP3, extract first 1.5s
async function loadBellSound() {
  try {
    const ctx = ensureAudioCtx();
    const resp = await fetch('/Temple_Bell_Sound.mp3');
    const arrayBuf = await resp.arrayBuffer();
    bellBuffer = await ctx.decodeAudioData(arrayBuf);

    // Extract first 1.5 seconds into a separate buffer
    const clipDuration = 1.5;
    const clipSamples = Math.min(
      Math.floor(clipDuration * bellBuffer.sampleRate),
      bellBuffer.length
    );
    bellClip = ctx.createBuffer(
      bellBuffer.numberOfChannels,
      clipSamples,
      bellBuffer.sampleRate
    );
    for (let ch = 0; ch < bellBuffer.numberOfChannels; ch++) {
      const src = bellBuffer.getChannelData(ch);
      const dst = bellClip.getChannelData(ch);
      for (let i = 0; i < clipSamples; i++) dst[i] = src[i];
    }
  } catch (e) {
    console.warn('Could not load bell sound:', e);
  }
}

// Play the 1.5s bell clip at a scheduled time
function strikeBell(ctx, startTime) {
  if (!bellClip) return;
  const source = ctx.createBufferSource();
  source.buffer = bellClip;
  source.connect(ctx.destination);
  source.start(startTime);
}

// Play temple bell 3 times with spacing
function playBell() {
  const ctx = ensureAudioCtx();
  const now = ctx.currentTime;
  strikeBell(ctx, now);         // 1st ring
  strikeBell(ctx, now + 1.5);   // 2nd ring
  strikeBell(ctx, now + 3.0);   // 3rd ring
}

// ══════════════════════════════════════════════════════
//  SLIDESHOW
// ══════════════════════════════════════════════════════
const slideshowEl = document.getElementById('slideshow');
const noImagesEl = document.getElementById('no-images');
let images = [];
let currentSlide = 0;
let slideInterval = null;

async function loadImages() {
  try {
    const resp = await fetch('/api/images');
    if (resp.ok) {
      images = await resp.json();
    } else {
      throw new Error('not ok');
    }
  } catch {
    // Fallback: try loading from a static image list (for Android/offline)
    try {
      const resp = await fetch('image-list.json');
      if (resp.ok) images = await resp.json();
      else images = [];
    } catch {
      images = [];
    }
  }

  if (images.length === 0) {
    noImagesEl.classList.add('show');
    return;
  }

  // Create two slide elements for crossfade
  const slideA = document.createElement('div');
  slideA.className = 'slide active';
  slideA.id = 'slide-a';

  const slideB = document.createElement('div');
  slideB.className = 'slide';
  slideB.id = 'slide-b';

  slideshowEl.appendChild(slideA);
  slideshowEl.appendChild(slideB);

  // Set first image
  slideA.style.backgroundImage = `url("/NRJD_Pics/${encodeURIComponent(images[0])}")`;

  // Preload all images
  images.forEach(img => {
    const i = new Image();
    i.src = `/NRJD_Pics/${encodeURIComponent(img)}`;
  });

  // Start rotation
  currentSlide = 0;
  slideInterval = setInterval(nextSlide, 10000);
}

function nextSlide() {
  if (images.length <= 1) return;

  currentSlide = (currentSlide + 1) % images.length;
  const slideA = document.getElementById('slide-a');
  const slideB = document.getElementById('slide-b');

  if (!slideA || !slideB) return;

  // Determine which is currently active
  if (slideA.classList.contains('active')) {
    slideB.style.backgroundImage = `url("/NRJD_Pics/${encodeURIComponent(images[currentSlide])}")`;
    slideA.classList.remove('active');
    slideB.classList.add('active');
  } else {
    slideA.style.backgroundImage = `url("/NRJD_Pics/${encodeURIComponent(images[currentSlide])}")`;
    slideB.classList.remove('active');
    slideA.classList.add('active');
  }
}

// ══════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════
const TIMER_DURATION = 180; // 3 minutes in seconds
let timeLeft = TIMER_DURATION;
let timerRunning = false;
let timerInterval = null;

const timerDisplay = document.getElementById('timer-display');
const btnStart = document.getElementById('btn-start');
const btnPause = document.getElementById('btn-pause');
const btnReset = document.getElementById('btn-reset');
const btnNext = document.getElementById('btn-next');
const btnFullscreen = document.getElementById('btn-fullscreen');
const toggleControls = document.getElementById('toggle-controls');
const controls = document.getElementById('controls');

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateTimerUI() {
  timerDisplay.textContent = formatTime(timeLeft);

  timerDisplay.classList.remove('warning', 'done');
  if (timeLeft === 0) {
    timerDisplay.classList.add('done');
  } else if (timeLeft <= 15) {
    timerDisplay.classList.add('warning');
  }
}

function startTimer() {
  if (timerRunning) return;
  if (timeLeft <= 0) return;

  // Ensure audio context is ready (needs user gesture)
  ensureAudioCtx();

  timerRunning = true;
  btnStart.disabled = true;
  btnPause.disabled = false;

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();

    if (timeLeft <= 0) {
      timerRunning = false;
      clearInterval(timerInterval);
      timerInterval = null;
      playBell();
      // Auto-reset and restart after bell finishes (~5s for 3 rings × 1.5s)
      setTimeout(() => {
        timeLeft = TIMER_DURATION;
        updateTimerUI();
        startTimer();
      }, 5500);
    }
  }, 1000);
}

function pauseTimer() {
  if (!timerRunning) return;
  timerRunning = false;
  clearInterval(timerInterval);
  timerInterval = null;
  btnStart.disabled = false;
  btnPause.disabled = true;
}

function resetTimer() {
  pauseTimer();
  timeLeft = TIMER_DURATION;
  updateTimerUI();
  btnStart.disabled = false;
  btnPause.disabled = true;
}

function nextParticipant() {
  playBell();
  resetTimer();
}

// ══════════════════════════════════════════════════════
//  FULLSCREEN
// ══════════════════════════════════════════════════════
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

// ══════════════════════════════════════════════════════
//  CONTROLS VISIBILITY
// ══════════════════════════════════════════════════════
let controlsVisible = true;

function toggleControlsVisibility() {
  controlsVisible = !controlsVisible;
  controls.classList.toggle('hidden', !controlsVisible);
  toggleControls.textContent = controlsVisible ? '☰' : '▲';
}

// ══════════════════════════════════════════════════════
//  EVENT LISTENERS
// ══════════════════════════════════════════════════════
btnStart.addEventListener('click', startTimer);
btnPause.addEventListener('click', pauseTimer);
btnReset.addEventListener('click', resetTimer);
btnNext.addEventListener('click', nextParticipant);
btnFullscreen.addEventListener('click', toggleFullscreen);
toggleControls.addEventListener('click', toggleControlsVisibility);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case ' ':
    case 'Enter':
      e.preventDefault();
      timerRunning ? pauseTimer() : startTimer();
      break;
    case 'r':
    case 'R':
      resetTimer();
      break;
    case 'n':
    case 'N':
      nextParticipant();
      break;
    case 'f':
    case 'F':
      toggleFullscreen();
      break;
    case 'h':
    case 'H':
      toggleControlsVisibility();
      break;
  }
});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
updateTimerUI();
loadImages();
loadBellSound();

// Fill mantra watermark background
(function fillWatermark() {
  const wm = document.getElementById('watermark');
  const lines = [
    'HARE KRISHNA HARE KRISHNA',
    'KRISHNA KRISHNA HARE HARE',
    'HARE RAMA HARE RAMA',
    'RAMA RAMA HARE HARE',
  ];
  // Repeat enough to fill screen
  for (let i = 0; i < 60; i++) {
    const span = document.createElement('span');
    span.textContent = lines[i % lines.length];
    wm.appendChild(span);
  }
})();

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
